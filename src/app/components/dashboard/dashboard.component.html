<div class="dashboard-container">
  <h2>Customer Dashboard</h2>

  <!-- Statistics Cards -->

  <div class="stats">
    <div class="card stat-card">
      <h3>Total Customers</h3>
      <p>{{ totalCustomers }}</p>
    </div>

    <div class="card stat-card">
      <h3>Models</h3>
      <p>{{ totalModels }}</p>
    </div>

    <div class="card stat-card">
      <h3>Due Soon</h3>
      <p>{{ dueSoon }}</p>
    </div>
  </div>

  <!-- Table Section -->

  <div class="card">
    <div class="table-header">
      <input
        type="text"
        placeholder="Search Customer..."
        (keyup)="applyFilter($event)"
        class="search-box"
      />
      <select (change)="onFilterTypeChange($event)" class="filter-type">
        <option value="all">All Customers</option>
        <option value="model">Filter by Model</option>
        <option value="due">Filter by Due Date</option>
      </select>

      <select
        (change)="onFilterValueChange($event)"
        class="filter-value"
        [disabled]="selectedFilterType === 'all'"
      >
        <option *ngFor="let option of filterValues" [value]="option">
          {{
            option === "all"
              ? "All"
              : option === "due7"
                ? "Due in 7 Days"
                : option === "overdue"
                  ? "Overdue"
                  : option
          }}
        </option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Registration No</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let customer of filteredCustomers; let i = index"
          (click)="openCustomer(i)"
          [class.selected-row]="i === selectedRowIndex"
          [class.due-soon]="isDueSoon(customer['Due Date'])"
          [class.overdue]="isOverdue(customer['Due Date'])"
        >
          <td>{{ customer.Name }}</td>
          <td>{{ customer.phno }}</td>
          <td>{{ customer["Registration No"] }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
